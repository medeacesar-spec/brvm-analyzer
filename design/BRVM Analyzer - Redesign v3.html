      <Code lang="python" filename="streamlit_theme/ui_helpers.py (extrait)">{`"""UI helpers BRVM Analyzer v3 — à utiliser partout."""
from pathlib import Path
import streamlit as st

PALETTE = {
    "primary": "#1F5D3A", "accent": "#B8532A",
    "up": "#1F5D3A",      "down": "#B42318",  "warn": "#B5730E",
    "text": "#1A1A1A",    "text_3": "#7A756C",
}

def load_theme():
    """À appeler UNE FOIS au début de chaque page (ou dans main.py)."""
    css = (Path(__file__).parent / "style.css").read_text()
    st.markdown(f"<style>{css}</style>", unsafe_allow_html=True)

def kpi_card(label, value, delta=None, suffix="", accent=None, compact=False):
    """Remplace st.metric avec un peu plus de contrôle (accent latéral)."""
    cls = "st-metric" + (f" {accent}" if accent else "")
    delta_html = ""
    if delta is not None:
        kind = "up" if delta > 0 else "down" if delta < 0 else "flat"
        arrow = "▲" if kind == "up" else "▼" if kind == "down" else "—"
        sign = "+" if delta > 0 else ""
        delta_html = f'<div class="delta {kind}">{arrow} {sign}{delta}{suffix}</div>'
    st.markdown(f"""
        <div class="{cls}">
            <div class="label">{label}</div>
            <div class="value{' sm' if compact else ''}">{value}</div>
            {delta_html}
        </div>
    """, unsafe_allow_html=True)

def tag(label, kind="neutral"):
    """kind: buy / sell / hold / neutral"""
    # Auto-map si on passe le label en français
    auto = {"acheter": "buy", "vendre": "sell", "conserver": "hold"}
    if kind == "neutral" and label.lower() in auto:
        kind = auto[label.lower()]
    st.markdown(f'<span class="tag {kind}">{label}</span>', unsafe_allow_html=True)

def dot(kind="neutral", inline=True):
    """kind: up / down / warn / neutral — à intercaler dans un markdown."""
    html = f'<span class="dot {kind}"></span>'
    if inline: return html
    st.markdown(html, unsafe_allow_html=True)

def stars(value, out_of=5):
    filled = "★" * int(value)
    empty  = "★" * (out_of - int(value))
    st.markdown(
        f'<span class="stars">{filled}<span class="off">{empty}</span></span>',
        unsafe_allow_html=True,
    )

def progress_bar(done, total, label=None):
    pct = int(100 * done / total)
    lbl = f'<div style="font-size:11px;color:var(--text-3);margin-bottom:4px">{label}</div>' if label else ""
    st.markdown(f"""
        {lbl}
        <div class="progress"><div class="fill" style="width:{pct}%"></div></div>
    """, unsafe_allow_html=True)
`}</Code>

      <Code lang="python" filename=".streamlit/config.toml">{`[theme]
base = "light"
primaryColor       = "#1F5D3A"
backgroundColor    = "#F7F5F0"

textColor          = "#1A1A1A"

[server]

`}</Code>

      <Notes>
        <b>Ordre d'intégration recommandé</b> :<br/>
        1. Poser les 3 fichiers. <code>load_theme()</code> tout en haut de <code>main.py</code>.<br/>
        2. Retirer <b>tous les emojis</b> des <code>st.title()</code>, <code>st.header()</code>, <code>st.tabs()</code>, labels de boutons.<br/>
        3. Remplacer les blocs <code>st.markdown("# 📊 …")</code> par <code>st.markdown("# …")</code> + <code>st.caption(…)</code>.<br/>
        4. Pour chaque page : appliquer le pattern "Header → KPI row → Tabs → Contenu" décrit dans les sections 01-10.<br/>
        5. Remplacer les radios multicolores dans les charts Plotly par <code>color_discrete_sequence=["#1F5D3A", "#7A756C", "#B8532A"]</code>.
      </Notes>
    </Section>
  );
}

    ["OCR EasyOCR/pytesseract : fallback silencieux (pas d'erreur jaune)", true],
    ["Sidebar : logo SVG inline au lieu de l'emoji 📊 BRVM", true],
    ["Dataviz : volume en barres monochromes avec opacity 0.4 (pas de multicolore)", true],
    ["Tous les délimiteurs horizontaux (st.divider) retirés : trop d'espace", true],
  ];

              border: "1.5px solid var(--border-strong)",

            <div style={{
              fontFamily: "var(--mono)", fontSize: 10,
              color: "var(--text-3)", textAlign: "right"
            }}>§ {String(i + 1).padStart(2, "0")}</div>
          </div>
        ))}
      </div>
    </Section>
  );
}
